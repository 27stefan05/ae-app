{% extends "base.html" %}

{% block title %}Neuer Arbeitsschein{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

    <h4 class="mb-4">Neuer Arbeitsschein</h4>

    <form method="POST" action="/eingabe">
        <div class="row g-3">

            <!-- AE-Nummer -->
            <div class="col-md-6">
                <label class="form-label">AE-Nummer</label>
                <input type="text" name="ae_nummer" class="form-control form-control-lg" 
                       value="{{ request.args.get('ae_nummer', '') }}" maxlength="8" required>
            </div>

            <!-- Vorgang -->
            <div class="col-md-3">
                <label class="form-label">Vorgang</label>
                <select name="vorgang" class="form-select form-select-lg" required>
                    {% for v in range(10, max_vorgaenge + 10, 10) %}
                    <option value="{{ v }}" {% if request.args.get('vorgang', '10')|int == v %}selected{% endif %}>{{ v }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Mappe -->
            <div class="col-md-3">
                <label class="form-label">Mappe</label>
                <input type="number" name="fach" class="form-control form-control-lg" 
                       value="{{ next_fach }}" readonly>
            </div>

            <!-- Firma -->
            <div class="col-md-6">
                <label class="form-label">Firma</label>
                <div class="input-group">
                    <select name="firma" class="form-select" id="firmaSelect">
                        <option value="">-- Firma auswählen --</option>
                        {% for firma in firmen %}
                        <option value="{{ firma.name }}" 
                            {% if request.args.get('preselect_firma') == firma.name %}selected{% endif %}>
                            {{ firma.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-primary" onclick="showNewFirmaModal()">Neu</button>
                </div>
            </div>

            <!-- Ort -->
            <div class="col-md-6">
                <label class="form-label">Ort</label>
                <div class="input-group">
                    <select name="ort" class="form-select" id="ortSelect">
                        <option value="">-- Ort auswählen --</option>
                        {% for ort in orte %}
                        <option value="{{ ort.name }}" 
                            {% if request.args.get('preselect_ort') == ort.name %}selected{% endif %}>
                            {{ ort.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-primary" onclick="showNewOrtModal()">Neu</button>
                </div>
            </div>

            <!-- Anzahl Mitarbeiter -->
            <div class="col-md-6">
                <label class="form-label">Anzahl Mitarbeiter</label>
                <input type="number" name="personen" class="form-control" min="1" 
                       value="{{ request.args.get('personen', '1') }}">
            </div>

            <!-- Telefonnummer -->
            <div class="col-md-6">
                <label class="form-label">Telefonnummer</label>
                <input type="text" name="telefonnummer" class="form-control" 
                       value="{{ request.args.get('telefonnummer', '') }}">
            </div>

            <!-- Bemerkung -->
            <div class="col-12">
                <label class="form-label">Bemerkung</label>
                <textarea name="bemerkung" class="form-control" rows="3">{{ request.args.get('bemerkung', '') }}</textarea>
            </div>
        </div>

        <div class="mt-4 d-flex gap-3">
            <button type="submit" class="btn btn-primary btn-lg">Speichern</button>
            <a href="/" class="btn btn-outline-secondary btn-lg">Abbrechen</a>
        </div>
    </form>
</div>

<!-- Neue Firma Modal -->
<div class="modal fade" id="newFirmaModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Neue Firma anlegen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="newFirmaName" class="form-control" placeholder="Firmenname">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" class="btn btn-primary" onclick="addNewFirma()">Anlegen & auswählen</button>
            </div>
        </div>
    </div>
</div>

<!-- Neuer Ort Modal -->
<div class="modal fade" id="newOrtModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Neuen Ort anlegen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="newOrtName" class="form-control" placeholder="Ortsname">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" class="btn btn-primary" onclick="addNewOrt()">Anlegen & auswählen</button>
            </div>
        </div>
    </div>
</div>

<script>
function showNewFirmaModal() {
    document.getElementById('newFirmaName').value = '';
    new bootstrap.Modal(document.getElementById('newFirmaModal')).show();
}

function showNewOrtModal() {
    document.getElementById('newOrtName').value = '';
    new bootstrap.Modal(document.getElementById('newOrtModal')).show();
}

function addNewFirma() {
    const name = document.getElementById('newFirmaName').value.trim();
    if (!name) return alert('Bitte Firmennamen eingeben');

    const params = new URLSearchParams(window.location.search);
    params.set('preselect_firma', name);

    window.location.href = '/eingabe?' + params.toString();
}

function addNewOrt() {
    const name = document.getElementById('newOrtName').value.trim();
    if (!name) return alert('Bitte Ortsnamen eingeben');

    const params = new URLSearchParams(window.location.search);
    params.set('preselect_ort', name);

    window.location.href = '/eingabe?' + params.toString();
}

// Automatische Auswahl nach Redirect
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    
    const preselectFirma = urlParams.get('preselect_firma');
    if (preselectFirma) {
        const select = document.getElementById('firmaSelect');
        if (select) select.value = preselectFirma;
    }

    const preselectOrt = urlParams.get('preselect_ort');
    if (preselectOrt) {
        const select = document.getElementById('ortSelect');
        if (select) select.value = preselectOrt;
    }
});
</script>
{% endblock %}
