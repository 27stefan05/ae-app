{% extends "base.html" %}

{% block title %}Übersicht{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

    <!-- Suchleiste -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="input-group input-group-lg">
                <input type="text" id="suchfeld" class="form-control"
                       placeholder="Suchen nach AE-Nummer, Firma, Ort, Telefon, Bemerkung...">
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="text-muted mb-0" id="listeHeader">Alle Arbeitsscheine</h5>

        <div class="d-flex gap-2">
            <button id="generatePdfBtn" class="btn btn-primary">
                <i class="bi bi-file-earmark-pdf me-2"></i> Jetzt PDF erzeugen
            </button>
            <a href="#" id="downloadPdfBtn" class="btn btn-outline-primary" style="display: none;" download>
                <i class="bi bi-download me-2"></i> PDF herunterladen
            </a>
        </div>
    </div>

    <div id="scheineListe" class="list-group"></div>

</div>

<script>
let allScheine = [];

function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function statusBadge(status) {
    if (status === 'ausgegeben' || status === 'in arbeit') {
        return '<span class="badge bg-success">In Arbeit</span>';
    }
    return '<span class="badge bg-secondary">Zurückgegeben</span>';
}

function loadAllScheine() {
    fetch('/scheine')
        .then(res => res.json())
        .then(data => {
            allScheine = data.slice().sort((a, b) => a.ae_nummer.localeCompare(b.ae_nummer) || a.vorgang - b.vorgang);
            renderListe();
        });
}

function renderListe() {
    const searchValue = document.getElementById('suchfeld').value.trim().toLowerCase();
    let filtered = allScheine;

    if (searchValue) {
        filtered = allScheine.filter(s =>
            [s.ae_nummer, s.firma, s.ort, s.telefonnummer, s.bemerkung].some(
                field => (field || '').toLowerCase().includes(searchValue)
            )
        );
        document.getElementById('listeHeader').textContent = `Suchergebnisse für "${searchValue}" (${filtered.length})`;
    } else {
        document.getElementById('listeHeader').textContent = `Alle Arbeitsscheine (${filtered.length})`;
    }

    const container = document.getElementById('scheineListe');

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="list-group-item text-center py-5">
                <p class="text-muted fs-5 mb-0">Keine Arbeitsscheine gefunden</p>
            </div>
        `;
        return;
    }

    container.innerHTML = filtered.map(s => `
        <div class="list-group-item p-0 mb-2 border rounded" data-id="${s.id}">
            <div class="px-3 py-2 d-flex justify-content-between align-items-center"
                 style="background-color:#0078DC; color:white; border-radius:6px 6px 0 0;">
                <div>
                    <strong>AE ${escapeHtml(s.ae_nummer)}</strong> &nbsp;&nbsp;
                    <span>Vorgang ${s.vorgang}</span> &nbsp;&nbsp;
                    <span>Mappe ${s.fach}</span>
                </div>
                ${statusBadge(s.status)}
            </div>
            <div class="px-3 py-2">
                <div class="small">
                    <strong>Firma:</strong> ${escapeHtml(s.firma) || '-'} &nbsp;&nbsp;
                    <strong>Ort:</strong> ${escapeHtml(s.ort) || '-'} &nbsp;&nbsp;
                    <strong>Mitarbeiter:</strong> ${s.personen} &nbsp;&nbsp;
                    <strong>Telefon:</strong> ${escapeHtml(s.telefonnummer) || '-'}
                </div>
                ${s.bemerkung ? `<div class="mt-1 text-danger small"><strong>Bemerkung:</strong> ${escapeHtml(s.bemerkung)}</div>` : ''}
            </div>
            <div class="px-3 pb-2 d-flex justify-content-end gap-2">
                <button data-action="edit" class="btn btn-sm btn-outline-primary">
                    <img src="/static/stift.svg" height="18"> Bearbeiten
                </button>
                <button data-action="delete" class="btn btn-sm btn-outline-danger">
                    <img src="/static/muell.svg" height="18"> Löschen
                </button>
            </div>
        </div>
    `).join('');
}

document.getElementById('scheineListe').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.closest('[data-id]').dataset.id;

    if (btn.dataset.action === 'edit') {
        location.href = `/edit/${id}`;
    } else if (btn.dataset.action === 'delete') {
        const schein = allScheine.find(s => String(s.id) === String(id));
        if (!confirm(`Möchtest du AE ${schein.ae_nummer} (Vorgang ${schein.vorgang}) wirklich löschen?`)) return;
        fetch(`/delete/${id}`, { method: 'DELETE' })
            .then(res => {
                if (res.ok) {
                    loadAllScheine();
                } else {
                    alert('Fehler beim Löschen!');
                }
            });
    }
});

document.getElementById('suchfeld').addEventListener('input', renderListe);

document.getElementById('generatePdfBtn').addEventListener('click', function() {
    const btn = this;
    const originalText = btn.innerHTML;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Wird erzeugt...';

    fetch('/generate_pdf_now', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            const downloadBtn = document.getElementById('downloadPdfBtn');
            downloadBtn.href = `/static/${data.filename}`;
            downloadBtn.style.display = 'inline-block';

            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> Fertig!';

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2500);
        })
        .catch(() => {
            alert('Fehler beim Erzeugen der PDF!');
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
});

window.onload = loadAllScheine;
</script>
{% endblock %}
