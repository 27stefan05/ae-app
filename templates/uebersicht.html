{% extends "base.html" %}

{% block title %}Übersicht{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Alle Arbeitsscheine</h4>
        
        <div class="d-flex gap-2">
            <!-- Jetzt PDF erzeugen Button -->
            <button id="generatePdfBtn" class="btn btn-primary">
                <i class="bi bi-file-earmark-pdf me-2"></i> Jetzt PDF erzeugen
            </button>
            
            <!-- PDF herunterladen Button -->
            <a href="#" id="downloadPdfBtn" class="btn btn-outline-primary" style="display: none;" download>
                <i class="bi bi-download me-2"></i> PDF herunterladen
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table id="uebersichtTable" class="table table-hover mb-0" style="width:100%">
                <thead class="table-light">
                    <tr>
                        <th>AE-Nummer</th>
                        <th>Vorgang</th>
                        <th>Mappe</th>
                        <th>Firma</th>
                        <th>Ort</th>
                        <th>Mitarbeiter</th>
                        <th>Telefon</th>
                        <th>Status</th>
                        <th>Bemerkung</th>
                        <th style="width: 90px;">Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Wird per DataTables befüllt -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- ===================== JAVASCRIPT ===================== -->
<script>
function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

$(document).ready(function() {
    const table = $('#uebersichtTable').DataTable({
        ajax: {
            url: '/scheine',
            dataSrc: ''
        },
        columns: [
            { data: 'ae_nummer', render: (data) => escapeHtml(data) },
            {
                data: 'vorgang',
                render: function(data) {
                    return data ? data : '';
                }
            },
            { data: 'fach' },
            { data: 'firma', render: (data) => escapeHtml(data) },
            { data: 'ort', render: (data) => escapeHtml(data) },
            { data: 'personen' },
            { data: 'telefonnummer', render: (data) => escapeHtml(data) },
            {
                data: 'status',
                render: function(data) {
                    if (data === 'ausgegeben' || data === 'in arbeit') {
                        return '<span class="badge bg-success">In Arbeit</span>';
                    } else {
                        return '<span class="badge bg-secondary">Zurückgegeben</span>';
                    }
                }
            },
            { data: 'bemerkung', render: (data) => escapeHtml(data) },
            {
                data: 'id',
                render: function(data) {
                    return `
                        <div class="d-flex gap-1">
                            <button data-action="edit" data-id="${data}"
                                    class="btn btn-outline-primary btn-sm p-1" style="width:32px; height:32px;">
                                <img src="/static/stift.svg" height="16">
                            </button>
                            <button data-action="delete" data-id="${data}"
                                    class="btn btn-outline-danger btn-sm p-1" style="width:32px; height:32px;">
                                <img src="/static/muell.svg" height="16">
                            </button>
                        </div>
                    `;
                }
            }
        ],
        order: [[0, 'asc'], [1, 'asc']],
        language: {
            "emptyTable": "Keine Daten in der Tabelle vorhanden",
            "info": "Zeige _START_ bis _END_ von _TOTAL_ Einträgen",
            "infoEmpty": "Zeige 0 bis 0 von 0 Einträgen",
            "infoFiltered": "(gefiltert aus _MAX_ Einträgen)",
            "lengthMenu": "Zeige _MENU_ Einträge",
            "loadingRecords": "Lade...",
            "processing": "Verarbeite...",
            "search": "Suchen:",
            "zeroRecords": "Keine passenden Einträge gefunden",
            "paginate": {
                "first": "Erste",
                "last": "Letzte",
                "next": "Nächste",
                "previous": "Vorherige"
            }
        },
        responsive: true
    });

    // Buttons in der Aktionen-Spalte (Event-Delegation statt inline onclick)
    $('#uebersichtTable tbody').on('click', '[data-action]', function() {
        const id = $(this).data('id');
        const row = table.row($(this).closest('tr')).data();
        if ($(this).data('action') === 'edit') {
            window.location.href = `/edit/${id}`;
        } else if ($(this).data('action') === 'delete') {
            deleteSchein(id, row.ae_nummer, row.vorgang);
        }
    });

    // PDF-Button Funktionalität
    document.getElementById('generatePdfBtn').addEventListener('click', function() {
        const btn = this;
        const originalText = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Wird erzeugt...';

        fetch('/generate_pdf_now', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                const downloadBtn = document.getElementById('downloadPdfBtn');
                downloadBtn.href = `/static/${data.filename}`;
                downloadBtn.style.display = 'inline-block';

                btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> Fertig!';

                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2500);
            })
            .catch(() => {
                alert('Fehler beim Erzeugen der PDF!');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
    });

    function deleteSchein(id, ae, vorgang) {
        if (!confirm(`Möchtest du AE ${ae} (Vorgang ${vorgang}) wirklich löschen?`)) {
            return;
        }

        fetch(`/delete/${id}`, { method: 'DELETE' })
            .then(response => {
                if (response.ok) {
                    table.ajax.reload();
                } else {
                    alert('Fehler beim Löschen!');
                }
            });
    }
});
</script>
{% endblock %}
