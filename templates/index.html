{% extends "base.html" %}

{% block title %}Arbeitsscheine Verwaltung{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

    <!-- Suchleiste -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="input-group input-group-lg">
                <input type="text" id="ae_nummer" class="form-control" 
                       placeholder="AE-Nummer eingeben..." autofocus
                       oninput="limitInput(this); filterListe()">
                <button class="btn btn-primary" onclick="showAusgebenModal()">
                    <img src="/static/plus.svg" height="24" style="filter: brightness(0) invert(1);"> Neuer Schein
                </button>
            </div>
        </div>
    </div>

    <h5 class="text-center mb-4 text-muted" id="listeHeader">Aktuell ausgegebene AE</h5>

    <!-- Liste -->
    <div id="scheineListe" class="list-group"></div>

</div>

<!-- Ausgeben Modal -->
<div class="modal fade" id="ausgebenModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Neuen Schein anlegen?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p>Die AE-Nummer <strong id="modalAeNummer"></strong> existiert noch nicht.</p>
                <p>Möchten Sie einen neuen Schein anlegen?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" id="confirmAusgeben" class="btn btn-primary">Ja, anlegen</button>
            </div>
        </div>
    </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Status ändern</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" id="statusModalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" id="confirmStatus" class="btn btn-primary">Bestätigen</button>
            </div>
        </div>
    </div>
</div>

<!-- Löschen Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Schein löschen?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" id="deleteModalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" id="confirmDelete" class="btn btn-danger">Löschen</button>
            </div>
        </div>
    </div>
</div>

<script>
// Uniper Farben
const uniperColors = ['#0476D9', '#5f2176', '#ee7203', '#00733f', '#002d5a', '#8c2a8c'];

let allScheine = [];

function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function loadAllScheine() {
    fetch('/scheine')
        .then(res => res.json())
        .then(data => {
            allScheine = data;
            filterListe();
        });
}

function renderScheineListe(filteredScheine) {
    const container = document.getElementById('scheineListe');
    container.innerHTML = '';

    if (filteredScheine.length === 0) {
        container.innerHTML = `
            <div class="list-group-item text-center py-5">
                <img src="/static/lupe.png" alt="Keine Ergebnisse" 
                     style="width: 90px; opacity: 0.7; margin-bottom: 20px;">
                <p class="text-muted fs-5 mb-1">Kein Arbeitsschein gefunden</p>
            </div>
        `;
        return;
    }

    const html = filteredScheine.map((s, index) => {
        const color = uniperColors[index % uniperColors.length];
        const isActive = s.status === 'ausgegeben' || s.status === 'in arbeit';

        return `
        <div class="list-group-item list-group-item-action p-0 mb-2 border rounded" data-id="${s.id}">

            <!-- Farbige Zeile oben -->
            <div style="background-color: ${color}; color: white; border-radius: 6px 6px 0 0;" class="px-3 py-2">
                <strong>AE ${escapeHtml(s.ae_nummer)}</strong> &nbsp;&nbsp;
                <span>Vorgang ${s.vorgang}</span> &nbsp;&nbsp;
                <span>Mappe ${s.fach}</span>
            </div>

            <!-- Info-Zeile -->
            <div class="px-3 py-2">
                <div class="small">
                    <strong>Firma:</strong> ${escapeHtml(s.firma) || '-'} &nbsp;&nbsp;
                    <strong>Ort:</strong> ${escapeHtml(s.ort) || '-'} &nbsp;&nbsp;
                    <strong>Mitarbeiter:</strong> ${s.personen} &nbsp;&nbsp;
                    <strong>Telefon:</strong> ${escapeHtml(s.telefonnummer) || '-'}
                </div>
                ${s.bemerkung ? `<div class="mt-1 text-danger small"><strong>Bemerkung:</strong> ${escapeHtml(s.bemerkung)}</div>` : ''}
            </div>

            <!-- Buttons -->
            <div class="px-3 pb-2 d-flex justify-content-end gap-2">
                ${isActive
                    ? `<button data-action="status" data-newstatus="zurueckgegeben" class="btn btn-sm btn-outline-warning text-dark">
                        <img src="/static/pause.svg" height="18"> Unterbrechung
                       </button>`
                    : `<button data-action="status" data-newstatus="in arbeit" class="btn btn-sm btn-outline-success">
                        <img src="/static/helm.svg" height="18"> In Arbeit
                       </button>`
                }
                <button data-action="edit" class="btn btn-sm btn-outline-primary">
                    <img src="/static/stift.svg" height="18"> Bearbeiten
                </button>
                <button data-action="delete" class="btn btn-sm btn-outline-danger">
                    <img src="/static/muell.svg" height="18"> Löschen
                </button>
            </div>
        </div>`;
    }).join('');

    container.innerHTML = html;
}

document.getElementById('scheineListe').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const item = btn.closest('[data-id]');
    const id = parseInt(item.dataset.id, 10);
    const schein = allScheine.find(s => s.id === id);
    if (!schein) return;

    if (btn.dataset.action === 'status') {
        showStatusModal(id, btn.dataset.newstatus, schein.ae_nummer, schein.vorgang);
    } else if (btn.dataset.action === 'edit') {
        location.href = `/edit/${id}`;
    } else if (btn.dataset.action === 'delete') {
        showDeleteModal(id, schein.ae_nummer, schein.vorgang);
    }
});

function filterListe() {
    const searchValue = document.getElementById('ae_nummer').value.trim().toLowerCase();

    let filtered = allScheine;

    if (searchValue) {
        filtered = allScheine.filter(s => 
            s.ae_nummer.toLowerCase().includes(searchValue)
        );
        document.getElementById('listeHeader').textContent = `Suchergebnisse für "${searchValue}"`;
    } else {
        filtered = allScheine.filter(s => 
            s.status === 'ausgegeben' || s.status === 'in arbeit'
        );
        document.getElementById('listeHeader').textContent = "Aktuell ausgegebene AE";
    }

    renderScheineListe(filtered);
}

function showStatusModal(id, newStatus, aeNummer, vorgang) {
    const actionText = newStatus === 'zurueckgegeben' ? 'Unterbrechung' : 'In Arbeit';
    
    document.getElementById('statusModalBody').innerHTML = `
        <p>Schein <strong>AE ${escapeHtml(aeNummer)} (Vorgang ${vorgang})</strong></p>
        <p>Status wirklich auf <strong>${actionText}</strong> setzen?</p>
    `;
    
    const modal = new bootstrap.Modal(document.getElementById('statusModal'));
    modal.show();

    document.getElementById('confirmStatus').onclick = function() {
        modal.hide();
        fetch(`/status/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: newStatus})
        }).then(() => {
            loadAllScheine();
            document.getElementById('ae_nummer').value = '';
            document.getElementById('ae_nummer').focus();
        });
    };
}

function showDeleteModal(id, aeNummer, vorgang) {
    document.getElementById('deleteModalBody').innerHTML = `
        <p>Möchten Sie den Schein <strong>AE ${escapeHtml(aeNummer)} (Vorgang ${vorgang})</strong> wirklich löschen?</p>
        <p class="text-danger">Diese Aktion kann nicht rückgängig gemacht werden.</p>
    `;
    const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
    modal.show();

    document.getElementById('confirmDelete').onclick = function() {
        fetch(`/delete/${id}`, { method: 'DELETE' })
            .then(res => {
                if (!res.ok) throw new Error('Löschen fehlgeschlagen');
                modal.hide();
                loadAllScheine();
            })
            .catch(err => alert('Fehler beim Löschen: ' + err.message));
    };
}

function showAusgebenModal() {
    const ae = document.getElementById('ae_nummer').value.trim();
    if (!ae) return;

    document.getElementById('modalAeNummer').textContent = ae;
    const modal = new bootstrap.Modal(document.getElementById('ausgebenModal'));
    modal.show();

    document.getElementById('confirmAusgeben').onclick = function() {
        modal.hide();
        window.location.href = `/eingabe?ae_nummer=${encodeURIComponent(ae)}`;
    };
}

function limitInput(input) {
    let value = input.value.replace(/[^0-9]/g, '');
    if (value.length > 8) value = value.slice(0, 8);
    input.value = value;
}

window.onload = function() {
    loadAllScheine();
    document.getElementById('ae_nummer').focus();
};
</script>
{% endblock %}
