{% extends "base.html" %}

{% block title %}Schein bearbeiten{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

    <h4 class="mb-4">Arbeitsschein bearbeiten</h4>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="id" value="{{ schein.id }}">

        <!-- Grunddaten -->
        <div class="card mb-4">
            <div class="card-header" style="background-color: #5f2176; color: white;">
                <h6 class="mb-0">Grunddaten</h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">AE-Nummer</label>
                        <input type="text" class="form-control form-control-lg" name="ae_nummer" 
                               value="{{ schein.ae_nummer }}" readonly>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Vorgang</label>
                        <select name="vorgang" class="form-select form-select-lg">
                            {% for v in range(10, max_vorgaenge + 10, 10) %}
                            <option value="{{ v }}" {{ 'selected' if v == schein.vorgang else '' }}>
                                {{ v }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Mappe</label>
                        <input type="number" class="form-control form-control-lg" name="fach" 
                               value="{{ schein.fach }}" readonly>
                    </div>
                </div>
            </div>
        </div>

        <!-- Firma & Ort -->
        <div class="row mb-4">
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header" style="background-color: #5f2176; color: white;">
                        <h6 class="mb-0">Firma</h6>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <select name="firma" class="form-select" id="firmaSelect">
                                <option value="">-- Firma auswählen --</option>
                                {% for firma in firmen %}
                                <option value="{{ firma.name }}" {{ 'selected' if firma.name == selected_firma else '' }}>
                                    {{ firma.name }}
                                </option>
                                {% endfor %}
                            </select>
                            <button type="button" class="btn btn-outline-primary" onclick="showNewFirmaModal()">Neu</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header" style="background-color: #5f2176; color: white;">
                        <h6 class="mb-0">Ort</h6>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <select name="ort" class="form-select" id="ortSelect">
                                <option value="">-- Ort auswählen --</option>
                                {% for ort in orte %}
                                <option value="{{ ort.name }}" {{ 'selected' if ort.name == selected_ort else '' }}>
                                    {{ ort.name }}
                                </option>
                                {% endfor %}
                            </select>
                            <button type="button" class="btn btn-outline-primary" onclick="showNewOrtModal()">Neu</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Weitere Angaben -->
        <div class="card mb-4">
            <div class="card-header" style="background-color: #5f2176; color: white;">
                <h6 class="mb-0">Weitere Angaben</h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Anzahl Mitarbeiter</label>
                        <input type="number" class="form-control" name="personen" value="{{ schein.personen }}" min="1">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Telefonnummer</label>
                        <input type="text" class="form-control" name="telefonnummer" value="{{ schein.telefonnummer }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Bemerkung</label>
                    <textarea name="bemerkung" class="form-control" rows="4">{{ schein.bemerkung or '' }}</textarea>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-lg" 
                    style="background-color: #5f2176; border-color: #5f2176; color: white;">
                Änderungen speichern
            </button>
            <a href="/" class="btn btn-outline-secondary btn-lg">Abbrechen</a>
        </div>

    </form>

</div>

<!-- Neue Firma Modal -->
<div class="modal fade" id="newFirmaModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Neue Firma hinzufügen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="newFirmaName" class="form-control" placeholder="Firmenname eingeben">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" class="btn btn-primary" onclick="addNewFirma()">Hinzufügen & auswählen</button>
            </div>
        </div>
    </div>
</div>

<!-- Neuer Ort Modal -->
<div class="modal fade" id="newOrtModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Neuen Ort hinzufügen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="newOrtName" class="form-control" placeholder="Ort eingeben">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="button" class="btn btn-primary" onclick="addNewOrt()">Hinzufügen & auswählen</button>
            </div>
        </div>
    </div>
</div>

<script>
// Modals
function showNewFirmaModal() {
    document.getElementById('newFirmaName').value = '';
    new bootstrap.Modal(document.getElementById('newFirmaModal')).show();
}

function addNewFirma() {
    const name = document.getElementById('newFirmaName').value.trim();
    if (!name) return;
    const currentOrt = document.getElementById('ortSelect').value || '';
    let url = `/edit/{{ schein.id }}?preselect_firma=${encodeURIComponent(name)}`;
    if (currentOrt) url += `&preselect_ort=${encodeURIComponent(currentOrt)}`;
    window.location.href = url;
}

function showNewOrtModal() {
    document.getElementById('newOrtName').value = '';
    new bootstrap.Modal(document.getElementById('newOrtModal')).show();
}

function addNewOrt() {
    const name = document.getElementById('newOrtName').value.trim();
    if (!name) return;
    const currentFirma = document.getElementById('firmaSelect').value || '';
    let url = `/edit/{{ schein.id }}?preselect_ort=${encodeURIComponent(name)}`;
    if (currentFirma) url += `&preselect_firma=${encodeURIComponent(currentFirma)}`;
    window.location.href = url;
}

// Autofokus
document.getElementById('newFirmaModal').addEventListener('shown.bs.modal', () => {
    setTimeout(() => document.getElementById('newFirmaName').focus(), 150);
});
document.getElementById('newOrtModal').addEventListener('shown.bs.modal', () => {
    setTimeout(() => document.getElementById('newOrtName').focus(), 150);
});
</script>
{% endblock %}
